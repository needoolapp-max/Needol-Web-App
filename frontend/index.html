<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#035ca1" />
    <!--
      Phase 8-6 — Content-Security-Policy (Phase 8.7 fix — Clerk production support).
      The strict production policy belongs in Cloudflare Transform Rule headers
      (runbook §3.C) — meta CSP is a defensive fallback. Notes:
      - 'unsafe-inline' on style-src: required for Tailwind utility injection +
        shadcn/ui chart helper inline styles.
      - 'unsafe-inline' on script-src: required for TanStack Start hydration's
        inline scroll-restore + stream-barrier scripts that ship inside the
        SSR shell HTML. Frame-ancestors is set here for documentation only —
        the runtime header is what enforces it; meta-tag CSP can't enforce
        frame-ancestors per spec.
      - Clerk production: production Clerk apps host JS at clerk.<your-domain>
        (e.g. https://clerk.needool.com). The wildcard *.clerk.accounts.dev
        only covers dev keys (pk_test_*) — production keys need the explicit
        production host allowlisted.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://*.clerk.accounts.dev https://clerk.needool.com https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:4100 https://api.needool.com https://*.clerk.accounts.dev https://clerk.needool.com https://*.supabase.co https://api-sandbox.nowpayments.io https://api.nowpayments.io https://cloudflareinsights.com; worker-src 'self' blob:; frame-src https://*.clerk.accounts.dev https://clerk.needool.com https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';"
    />
    <meta name="description" content="Find trusted skills, services, and providers worldwide. Hire local talent or connect globally with Needool." />
    <meta property="og:title" content="Needool - Global skills directory & marketplace" />
    <meta property="og:description" content="Find trusted skills and providers worldwide." />
    <meta property="og:type" content="website" />
    <!--
      Phase 10-2 — Font strategy. media="print" deferral hid text until onload,
      causing CLS when fonts swapped in. Trimmed weights to those actually used
      sitewide (Urbanist 600/700/800, DM Sans 400/500/700) and load via standard
      stylesheet with display=swap so FOFT is brief and stable.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Urbanist:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Needool - Global skills directory & marketplace</title>

    <!--
      Phase 10-2 — Inline boot preloader ("Network Boot"). Paints on first HTML
      byte before any CSS or JS arrives, so users never face a blank shell.
      Removed by spa.tsx once the router resolves its first route. Inline by
      design: zero network round trips, zero React dependency. CSP 'unsafe-inline'
      on style-src is already permitted (see meta above).
    -->
    <style>
      :root { color-scheme: light dark; }
      #boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.25rem;
        background: #e8eef2; color: #0b1c28;
        font-family: "Urbanist", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        transition: opacity 220ms ease-out;
      }
      @media (prefers-color-scheme: dark) {
        #boot { background: #020c13; color: #e8f8ff; }
      }
      #boot .boot__mark {
        font-weight: 800;
        font-size: clamp(2rem, 6vw, 3.25rem);
        letter-spacing: -0.025em;
        line-height: 1;
        overflow: hidden;
        white-space: nowrap;
        width: 0;
        animation: bootMark 0.9s steps(7, end) 0.1s forwards;
      }
      @keyframes bootMark {
        from { width: 0; }
        to { width: 7ch; }
      }
      #boot .boot__rail {
        position: relative;
        width: min(280px, 60vw);
        height: 1px;
        background: rgba(11, 28, 40, 0.12);
        overflow: hidden;
      }
      @media (prefers-color-scheme: dark) {
        #boot .boot__rail { background: rgba(232, 248, 255, 0.12); }
      }
      #boot .boot__rail::after {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 0;
        background: linear-gradient(90deg, #0277b4, #00c8d4);
        animation: bootRail 2.5s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
      }
      @keyframes bootRail {
        0% { width: 0; }
        100% { width: 80%; }
      }
      #boot .boot__meta {
        font-family: ui-monospace, "Cascadia Mono", "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.7rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.55;
      }
      #boot .boot__meta--slow {
        margin-top: -0.5rem;
        opacity: 0;
        animation: bootSlow 0s 6s forwards;
      }
      @keyframes bootSlow { to { opacity: 0.7; } }
      #boot.boot--done {
        opacity: 0;
        pointer-events: none;
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .boot__mark { animation: none; width: auto; }
        #boot .boot__rail::after { animation: none; width: 80%; }
        #boot .boot__meta--slow { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-hidden="true">
      <div class="boot__mark">NEEDOOL</div>
      <div class="boot__rail"></div>
      <div class="boot__meta">Establishing network &middot; Lagos &rarr; Worldwide</div>
      <div class="boot__meta boot__meta--slow">Slow connection &middot; Still loading</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/spa.tsx"></script>
  </body>
</html>

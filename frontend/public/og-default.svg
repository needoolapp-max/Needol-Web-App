<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Needool — Find skill, share need, hire verified.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="220" fill="url(#accent)" opacity="0.18"/>
  <circle cx="160" cy="540" r="180" fill="url(#accent)" opacity="0.12"/>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#f8fafc">
    <text x="80" y="200" font-size="62" font-weight="700">Needool</text>
    <text x="80" y="300" font-size="44" font-weight="600" fill="#e2e8f0">Find skill. Share need. Hire verified.</text>
    <text x="80" y="380" font-size="26" fill="#94a3b8">A Lagos-first marketplace for skilled providers, real needs, and trusted hires.</text>
    <text x="80" y="530" font-size="22" fill="#94a3b8">needool.app</text>
  </g>
  <rect x="80" y="555" width="180" height="6" rx="3" fill="url(#accent)"/>
